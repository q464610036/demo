<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤Excel处理系统-文件上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 40px;
        }
        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 40px;
            font-weight: 600;
        }
        .upload-box {
            border: 2px dashed #e0e6ed;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .upload-box.active {
            border-color: #409eff;
            background-color: #f5faff;
        }
        .upload-icon {
            font-size: 48px;
            color: #409eff;
            margin-bottom: 16px;
        }
        .upload-tip {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .file-label {
            font-weight: 500;
            color: #333;
            width: 120px;
            text-align: left;
        }
        .file-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #e0e6ed;
            border-radius: 4px;
            color: #666;
            font-size: 14px;
        }
        .file-input::-webkit-file-upload-button {
            background: #409eff;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-process {
            width: 100%;
            height: 48px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-process:disabled {
            background: #c6e2ff;
            cursor: not-allowed;
        }
        .btn-process:hover:not(:disabled) {
            background: #337ecc;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .status.success {
            color: #67c23a;
        }
        .status.error {
            color: #f56c6c;
        }
        .tip-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 30px;
            line-height: 1.5;
        }
    </style>
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.8/axios.min.js"></script>
</head>
<body>
<div class="container">
    <h1 class="title">考勤Excel处理系统</h1>
    <div class="upload-box" id="uploadBox">
        <div class="upload-icon">📁</div>
        <div class="upload-tip">拖拽4个Excel文件到此处，或点击下方选择文件</div>
    </div>

    <div class="file-list">
        <div class="file-item">
            <span class="file-label">打卡记录：</span>
            <input type="file" class="file-input" id="checkFile" accept=".xlsx" name="checkFile">
        </div>
        <div class="file-item">
            <span class="file-label">请假记录：</span>
            <input type="file" class="file-input" id="leaveFile" accept=".xlsx" name="leaveFile">
        </div>
        <div class="file-item">
            <span class="file-label">外出记录：</span>
            <input type="file" class="file-input" id="outFile" accept=".xlsx" name="outFile">
        </div>
        <div class="file-item">
            <span class="file-label">出差记录：</span>
            <input type="file" class="file-input" id="tripFile" accept=".xlsx" name="tripFile">
        </div>
    </div>

    <button class="btn-process" id="processBtn" disabled>开始处理并下载</button>
    <div class="status" id="status">请选择全部4个Excel文件（仅支持.xlsx格式）</div>
</div>
<div class="tip-text">
    注意：1. 请确保后端项目已启动（地址：http://localhost:8080）<br>
    2. 仅支持.xlsx格式Excel，请勿上传.xls旧格式<br>
    3. 文件名无要求，表头需与原始考勤表一致
</div>

<script>
    // 获取DOM元素
    const uploadBox = document.getElementById('uploadBox');
    const checkFile = document.getElementById('checkFile');
    const leaveFile = document.getElementById('leaveFile');
    const outFile = document.getElementById('outFile');
    const tripFile = document.getElementById('tripFile');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const allFileInputs = [checkFile, leaveFile, outFile, tripFile];

    // 拖拽上传样式切换
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('active');
    });
    uploadBox.addEventListener('dragleave', () => {
        uploadBox.classList.remove('active');
    });
    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('active');
        const files = e.dataTransfer.files;
        if (files.length === 4) {
            allFileInputs.forEach((input, index) => {
                input.files = files;
            });
            checkFileStatus();
        } else {
            status.className = 'status error';
            status.innerText = '错误：请同时拖拽4个Excel文件（打卡/请假/外出/出差）';
        }
    });

    // 监听文件选择变化，检查是否选全4个文件
    allFileInputs.forEach(input => {
        input.addEventListener('change', checkFileStatus);
    });

    // 检查文件选择状态，启用/禁用按钮
    function checkFileStatus() {
        const isAllSelected = allFileInputs.every(input => input.files.length > 0);
        const isAllXlsx = allFileInputs.every(input =>
            input.files.length > 0 && input.files[0].name.endsWith('.xlsx')
        );
        if (isAllSelected && isAllXlsx) {
            processBtn.disabled = false;
            status.className = 'status success';
            status.innerText = '文件选择完成，点击按钮开始处理';
        } else if (isAllSelected && !isAllXlsx) {
            processBtn.disabled = true;
            status.className = 'status error';
            status.innerText = '错误：仅支持.xlsx格式Excel文件，请重新选择';
        } else {
            processBtn.disabled = true;
            status.className = 'status';
            status.innerText = `已选择${allFileInputs.filter(i=>i.files.length>0).length}/4个文件，继续选择`;
        }
    }

    // 处理按钮点击事件
    processBtn.addEventListener('click', async () => {
        const formData = new FormData();
        // 添加4个文件到FormData
        formData.append('checkFile', checkFile.files[0]);
        formData.append('leaveFile', leaveFile.files[0]);
        formData.append('outFile', outFile.files[0]);
        formData.append('tripFile', tripFile.files[0]);

        try {
            processBtn.disabled = true;
            status.className = 'status';
            status.innerText = '正在处理中，请稍候...（请勿刷新页面）';
            // 调用后端接口
            const response = await axios({
                method: 'post',
                url: 'http://localhost:8080/att/process',
                data: formData,
                responseType: 'blob', // 二进制流（Excel文件）
                headers: {
                    'Content-Type': 'multipart/form-data'
                }
            });
            // 处理返回的Excel文件，自动下载
            const blob = new Blob([response.data], {
                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            });
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `考勤处理结果_${new Date().getTime()}.xlsx`;
            a.click();
            window.URL.revokeObjectURL(downloadUrl);

            status.className = 'status success';
            status.innerText = '处理完成！Excel文件已自动下载';
        } catch (error) {
            processBtn.disabled = false;
            status.className = 'status error';
            if (error.message.includes('Network Error')) {
                status.innerText = '错误：未连接到后端服务，请检查项目是否已启动（localhost:8080）';
            } else {
                status.innerText = `处理失败：${error.response?.data?.message || '服务器内部错误'}`;
            }
        }
    });
</script>
</body>
</html>
